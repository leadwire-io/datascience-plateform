networks:
  dtnum-network:
    driver: bridge
    name: dtnum-network

volumes:
  keycloak-db-data:
  minio-data:
  certs-data:

services:

  cert-generator:
    image: alpine:latest
    container_name: dtnum-cert-generator
    volumes:
      - certs-data:/certs
      - ./generate-cert.sh:/generate-cert.sh
    command: sh /generate-cert.sh
    restart: "no"

  nginx:
    image: nginx:alpine
    container_name: dtnum-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - certs-data:/etc/nginx/certs:ro
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/services:/etc/nginx/services
    networks:
      - dtnum-network
    depends_on:
      - cert-generator
      - dtnum-labs
      - keycloak
      - minio
    restart: unless-stopped

  keycloak-db:
    image: postgres:15
    container_name: dtnum-keycloak-db
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: Keycloak@2026!
    volumes:
      - keycloak-db-data:/var/lib/postgresql/data
    networks:
      - dtnum-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: dtnum-keycloak
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: Keycloak@2026!
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: Keycloak@2026!
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
      KC_PROXY_HEADERS: xforwarded
      KC_HOSTNAME: dtnum.nubo.local
      KC_HOSTNAME_PATH: /auth
      KC_HTTP_RELATIVE_PATH: /auth
    command: start-dev
    expose:
      - "8080"
    networks:
      - dtnum-network
    depends_on:
      keycloak-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "cat /dev/null > /dev/tcp/localhost/8080 && echo ok || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 90s
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: dtnum-minio
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: Minio@2026!
    command: server /data --console-address ":9001"
    expose:
      - "9000"
      - "9001"
    volumes:
      - minio-data:/data
    networks:
      - dtnum-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  dtnum-labs:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dtnum-labs
    environment:
      KEYCLOAK_INTERNAL: http://keycloak:8080/auth/realms/datalab
      KEYCLOAK_EXTERNAL: https://dtnum.nubo.local/auth/realms/datalab
      CLIENT_ID: datalab-lite
      CLIENT_SECRET: ""
      REDIRECT_URI: https://dtnum.nubo.local/callback
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: admin
      MINIO_SECRET_KEY: Minio@2026!
      MINIO_SECURE: "false"
      DOMAIN: dtnum.nubo.local
      DOCKER_NETWORK: dtnum-network
    expose:
      - "8000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./templates:/app/templates
      - ./nginx/services:/etc/nginx/services
    networks:
      - dtnum-network
    depends_on:
      - keycloak
      - minio
    restart: unless-stopped
